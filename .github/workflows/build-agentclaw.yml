name: Build OpenCode for AgentClaw

on:
  workflow_dispatch:
    inputs:
      opencode_version:
        description: 'OpenCode version (from Hope2333 releases)'
        required: false
        default: '1.4.0'

jobs:
  build:
    name: Repackage OpenCode for AgentClaw
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup version
        run: |
          VER="${{ github.event.inputs.opencode_version }}"
          echo "VER=$VER" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget dpkg sed zstd

      - name: Download Hope2333 prebuilt .deb
        run: |
          set -euo pipefail
          RELEASE_TAG="Push260401"
          DEB_URL="https://github.com/Hope2333/opencode-termux/releases/download/${RELEASE_TAG}/opencode_${{ env.VER }}_aarch64.deb"
          echo "Downloading from: $DEB_URL"
          curl -sL "$DEB_URL" -o hope-opencode.deb
          echo "Downloaded:"
          ls -lh hope-opencode.deb

      - name: Extract and repackage for AgentClaw
        run: |
          set -euo pipefail
          mkdir -p work
          cd work

          # Extract the original .deb
          ar x ../hope-opencode.deb
          tar --zstd -xf data.tar.zst

          # Verify contents
          echo "=== Extracted files ==="
          find data -type f -exec ls -lh {} \;

          # Verify binary type (should be bionic/Android)
          file data/data/com.termux/files/usr/lib/opencode/runtime/opencode 2>/dev/null || \
          file data/data/com.termux/files/usr/lib/opencode/opencode 2>/dev/null || \
          echo "Looking for binary..."
          find data -type f -name "opencode" -exec file {} \;

      - name: Create .deb package
        run: |
          set -euo pipefail
          VERSION="${{ env.VER }}"
          OUT_DIR="packaging/dpkg"
          mkdir -p "$OUT_DIR/root/DEBIAN"

          # Repackage - keep original structure (Termux paths are handled by the wrapper)
          # We'll install as-is since the wrapper creates the environment
          cd work
          cp -a data/* "../$OUT_DIR/root/"
          cd ..

          # Create DEBIAN control
          tee "$OUT_DIR/root/DEBIAN/control" > /dev/null << CEOF
          Package: opencode
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: arm64
          Maintainer: Netsnake-TN <netsnake-tn@users.noreply.github.com>
          Description: OpenCode AI agent for AgentClaw
           Repackaged from Hope2333/opencode-termux for AgentClaw.
          CEOF

          dpkg-deb --build "$OUT_DIR/root" "$OUT_DIR/opencode_${VERSION}_agentclaw-arm64.deb"
          ls -lh "$OUT_DIR/opencode_${VERSION}_agentclaw-arm64.deb"
          echo "Created .deb package"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencode-agentclaw-arm64
          path: packaging/dpkg/*.deb
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dpkg/*.deb
          body: |
            ## OpenCode ${{ env.VER }} for AgentClaw (aarch64)

            Repackaged from [Hope2333/opencode-termux](https://github.com/Hope2333/opencode-termux).

            ### Installation
            ```bash
            # Extract and install manually (dpkg architecture mismatch):
            ar x opencode_${{ env.VER }}_agentclaw-arm64.deb
            tar --zstd -xf data.tar.zst -C /
            ```
          draft: false
          prerelease: false
