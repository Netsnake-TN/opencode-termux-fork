# GitHub Actions Workflow: Build OpenCode for Termux
#
# Builds DEB and PACMAN packages for OpenCode on Termux
# Supports: aarch64 (arm64) only - armv7 blocked by Bun dependency

name: Build OpenCode Termux

on:
  push:
    branches: [main, master]
    paths:
      - 'packaging/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      opencode_version:
        description: 'OpenCode version (e.g., 1.2.10)'
        required: false
        default: '1.2.10'
      package_format:
        description: 'Package format'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - deb
          - pacman

env:
  OPENCODE_VERSION: ${{ github.event.inputs.opencode_version || '1.2.10' }}
  PACKAGE_FORMAT: ${{ github.event.inputs.package_format || 'both' }}
  PKGREL: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/termux/package-builder:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          apt-get update || true
          apt-get install -y curl rsync dpkg-dev xz-utils || true
          uname -a

      - name: Download OpenCode binary
        run: |
          mkdir -p artifacts/staged/prefix/data/data/com.termux/files/usr/bin
          mkdir -p artifacts/staged/prefix/data/data/com.termux/files/usr/lib/opencode/runtime
          mkdir -p runtime
          
          OPENCODE_URL="https://github.com/anomalyco/opencode/releases/download/v${{ env.OPENCODE_VERSION }}/opencode-linux-arm64.tar.gz"
          echo "Downloading: $OPENCODE_URL"
          curl -L -o /tmp/opencode.tar.gz "$OPENCODE_URL"
          tar -xzf /tmp/opencode.tar.gz -C /tmp/
          
          OPENCODE_BIN=$(find /tmp -name "opencode" -type f -executable | head -1)
          
          if [[ -z "$OPENCODE_BIN" ]]; then
            echo "OpenCode binary not found in archive"
            find /tmp -type f | head -20
            exit 1
          fi
          
          cp "$OPENCODE_BIN" artifacts/staged/prefix/data/data/com.termux/files/usr/lib/opencode/runtime/opencode
          cp "$OPENCODE_BIN" runtime/opencode
          chmod +x artifacts/staged/prefix/data/data/com.termux/files/usr/lib/opencode/runtime/opencode
          chmod +x runtime/opencode
          echo "OpenCode binary downloaded"

      - name: Create launcher script
        run: |
          cat > artifacts/staged/prefix/data/data/com.termux/files/usr/bin/opencode << 'ENDSCRIPT'
          #!/data/data/com.termux/files/usr/bin/bash
          set -euo pipefail
          SELF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          OPENCODE_RUNTIME="$SELF_DIR/../lib/opencode/runtime/opencode"
          
          cleanup_state_locks() {
            local state_dir="${XDG_STATE_HOME:-$HOME/.local/state}/opencode"
            [[ -d "$state_dir" ]] && find "$state_dir" -maxdepth 1 -type f -name '*.lock' -delete 2>/dev/null || true
          }
          
          cleanup_tty() {
            [[ -t 1 ]] && printf '\033[?1049l\033[?25h\033[0m' >/dev/tty 2>/dev/null || true
          }
          
          trap cleanup_tty EXIT INT TERM HUP QUIT
          cleanup_state_locks
          
          : "${OPENCODE_DISABLE_DEFAULT_PLUGINS:=1}"
          export OPENCODE_DISABLE_DEFAULT_PLUGINS
          
          exec "$OPENCODE_RUNTIME" "$@"
          ENDSCRIPT
          chmod +x artifacts/staged/prefix/data/data/com.termux/files/usr/bin/opencode

      - name: Build DEB package
        if: ${{ github.event.inputs.package_format == 'deb' || github.event.inputs.package_format == 'both' || github.event.inputs.package_format == '' }}
        run: |
          mkdir -p packages
          
          pkgdir="packages/opencode-termux"
          rm -rf "$pkgdir"
          mkdir -p "$pkgdir/DEBIAN"
          mkdir -p "$pkgdir/data/data/com.termux/files/usr/bin"
          mkdir -p "$pkgdir/data/data/com.termux/files/usr/lib/opencode/runtime"
          
          cp -a artifacts/staged/prefix/data/data/com.termux/files/usr/bin/opencode "$pkgdir/data/data/com.termux/files/usr/bin/"
          cp -a artifacts/staged/prefix/data/data/com.termux/files/usr/lib/opencode/runtime/opencode "$pkgdir/data/data/com.termux/files/usr/lib/opencode/runtime/"
          
          cat > "$pkgdir/DEBIAN/control" << EOF
          Package: opencode
          Version: ${{ env.OPENCODE_VERSION }}
          Architecture: aarch64
          Maintainer: Hope2333
          Section: utils
          Priority: optional
          Description: Open source coding agent for Termux with TTY+lock cleanup
          Depends: bun, bash, ncurses
          EOF
          
          INSTALLED_SIZE=$(du -sk "$pkgdir" | cut -f1)
          echo "Installed-Size: $INSTALLED_SIZE" >> "$pkgdir/DEBIAN/control"
          
          cat > "$pkgdir/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          echo "OpenCode for Termux installed!"
          echo "Usage: opencode"
          EOF
          chmod 755 "$pkgdir/DEBIAN/postinst"
          chmod 755 "$pkgdir/DEBIAN"
          
          dpkg-deb --build "$pkgdir" packages/opencode-termux_${{ env.OPENCODE_VERSION }}_aarch64.deb
          ls -lh packages/*.deb

      - name: Build PACMAN package
        if: ${{ github.event.inputs.package_format == 'pacman' || github.event.inputs.package_format == 'both' || github.event.inputs.package_format == '' }}
        run: |
          mkdir -p packages
          
          pkgdir="/tmp/pkgbuild/pkg"
          rm -rf "$pkgdir"
          mkdir -p "$pkgdir/data/data/com.termux/files/usr/lib/opencode/runtime"
          mkdir -p "$pkgdir/data/data/com.termux/files/usr/bin"
          
          cp runtime/opencode "$pkgdir/data/data/com.termux/files/usr/lib/opencode/runtime/opencode"
          chmod 755 "$pkgdir/data/data/com.termux/files/usr/lib/opencode/runtime/opencode"
          
          cat > "$pkgdir/data/data/com.termux/files/usr/bin/opencode" << 'ENDSCRIPT'
          #!/data/data/com.termux/files/usr/bin/bash
          set -euo pipefail
          SELF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          OPENCODE_RUNTIME="$SELF_DIR/../lib/opencode/runtime/opencode"
          cleanup_state_locks() {
            local state_dir="${XDG_STATE_HOME:-$HOME/.local/state}/opencode"
            [[ -d "$state_dir" ]] && find "$state_dir" -maxdepth 1 -type f -name '*.lock' -delete 2>/dev/null || true
          }
          cleanup_tty() { [[ -t 1 ]] && printf '\033[?1049l\033[?25h\033[0m' >/dev/tty 2>/dev/null || true; }
          trap cleanup_tty EXIT INT TERM HUP QUIT
          cleanup_state_locks
          : "${OPENCODE_DISABLE_DEFAULT_PLUGINS:=1}"
          export OPENCODE_DISABLE_DEFAULT_PLUGINS
          exec "$OPENCODE_RUNTIME" "$@"
          ENDSCRIPT
          chmod 755 "$pkgdir/data/data/com.termux/files/usr/bin/opencode"
          
          cat > "$pkgdir/.PKGINFO" << EOF
          pkgname = opencode
          pkgver = ${{ env.OPENCODE_VERSION }}-${{ env.PKGREL }}
          pkgdesc = Open source coding agent for Termux with TTY+lock cleanup
          url = https://github.com/anomalyco/opencode
          builddate = $(date +%s)
          packager = Hope2333
          size = $(du -sk "$pkgdir" | cut -f1)
          arch = aarch64
          license = MIT
          depend = bun
          depend = bash
          depend = ncurses
          EOF
          
          tar -cJf packages/opencode-termux_${{ env.OPENCODE_VERSION }}-${{ env.PKGREL }}_aarch64.pkg.tar.xz -C "$pkgdir" .
          ls -lh packages/*.pkg.tar.xz

      - name: Upload DEB artifact
        if: ${{ github.event.inputs.package_format == 'deb' || github.event.inputs.package_format == 'both' || github.event.inputs.package_format == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: opencode-termux-deb-aarch64
          path: packages/*.deb
          retention-days: 30

      - name: Upload PACMAN artifact
        if: ${{ github.event.inputs.package_format == 'pacman' || github.event.inputs.package_format == 'both' || github.event.inputs.package_format == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: opencode-termux-pacman-aarch64
          path: packages/*.pkg.tar.xz
          retention-days: 30

  check-armv7:
    runs-on: ubuntu-latest
    steps:
      - name: Check OpenCode armv7 availability
        run: |
          echo "Checking OpenCode armv7 binary availability..."
          
          OPENCODE_URL="https://github.com/anomalyco/opencode/releases/download/v${{ env.OPENCODE_VERSION }}/opencode-linux-arm.tar.gz"
          HTTP_CODE=$(curl -sI "$OPENCODE_URL" | head -1 | awk '{print $2}')
          
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "OpenCode armv7 binary is available!"
          else
            echo "OpenCode armv7 binary NOT available (HTTP $HTTP_CODE)"
            echo ""
            echo "Available architectures:"
            curl -s "https://api.github.com/repos/anomalyco/opencode/releases/latest" | grep -o '"name": "opencode-linux-[^"]*"' || true
          fi
        continue-on-error: true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: opencode-termux-deb-aarch64
          path: dist/
        continue-on-error: true

      - name: Download PACMAN artifact
        uses: actions/download-artifact@v4
        with:
          name: opencode-termux-pacman-aarch64
          path: dist/
        continue-on-error: true

      - name: List artifacts
        run: ls -la dist/ || echo "No artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true
